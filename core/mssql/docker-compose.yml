name: mssql

services:
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mssql
    restart: unless-stopped
    ports:
      - "1433:1433"
    env_file:
      - .env
    user: root
    volumes:
      - ./data:/var/opt/mssql
    networks:
      - lab-network

networks:
  lab-network:
    external: true
