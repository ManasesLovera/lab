# Proxy Configuration for Lab Services

# N8N
server {
    listen 80;
    server_name n8n.local;

    location / {
        # Use Docker's internal DNS to resolve containers dynamically
        resolver 127.0.0.11 valid=30s;
        set $upstream_n8n n8n_local;
        
        proxy_pass http://$upstream_n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSockets support for n8n
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Dockge
server {
    listen 80;
    server_name dockge.local;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_dockge dockge;

        proxy_pass http://$upstream_dockge:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# OpenProject
server {
    listen 80;
    server_name openproject.local;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_openproject openproject;

        proxy_pass http://$upstream_openproject:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Default server for unmatched domains
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
