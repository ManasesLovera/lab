# Default server for unmatched domains
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# n8n — Local + Production
server {
    listen 80;
    server_name n8n.rpi.local n8n.mlovera.dev;

    resolver 127.0.0.11 valid=30s;
    set $upstream_n8n n8n_local;

    location / {
        proxy_pass http://$upstream_n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Elasticsearch — Local only
server {
    listen 80;
    server_name elasticsearch.rpi.local;

    resolver 127.0.0.11 valid=30s;
    set $upstream_es elasticsearch;

    location / {
        proxy_pass http://$upstream_es:9200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Personal Todo App — Local + Production
server {
    listen 80;
    server_name todo.rpi.local todo.mlovera.dev;

    resolver 127.0.0.11 valid=30s;
    set $upstream_todo todo;

    location / {
        proxy_pass http://$upstream_todo:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE Support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }
}

