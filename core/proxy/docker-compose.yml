version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: lab-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_SUFFIX=${DOMAIN_SUFFIX:-local}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./templates:/etc/nginx/templates:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - lab-network

networks:
  lab-network:
    external: true
