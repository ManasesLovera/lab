version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: lab-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - lab-network

networks:
  lab-network:
    external: true
