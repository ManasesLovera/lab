version: '3.8'

services:
  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # Access to Docker for monitoring/management
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage for Dockge's own data (database, config)
      - ./data:/app/data
      # Mapping the lab directory to the same path inside for symlink resolution
      - /home/mlovera/lab:/home/mlovera/lab
    environment:
      - DOCKGE_STACKS_DIR=/home/mlovera/lab/external/dockge/stacks
    networks:
      - lab-network

networks:
  lab-network:
    external: true
