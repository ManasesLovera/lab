name: n8n

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_local
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
    volumes:
      - ./data:/home/node/.n8n
      - ../../shared:/home/node/shared:ro
    networks:
      - lab-network
    deploy:
      resources:
        limits:
          memory: 2G

  python-runner:
    image: n8nio/runners:latest
    container_name: n8n_python_runner
    restart: unless-stopped
    depends_on:
      - n8n
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n_local:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    networks:
      - lab-network

networks:
  lab-network:
    external: true