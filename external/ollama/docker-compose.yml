name: ollama

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_ORIGINS=*
    ports:
      - "11434:11434" # Exposed to local network (0.0.0.0)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lab-network

  openclaw-gateway:
    container_name: openclaw
    image: ghcr.io/openclaw/openclaw:latest
    networks:
      - lab-network
    env_file:
      - /home/mlovera/lab/external/ollama/.env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OPENCLAW_GATEWAY_AUTH_MODE: token
      OPENCLAW_GATEWAY_REMOTE_URL: http://openclaw.${DOMAIN_SUFFIX:-local}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/mlovera/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/mlovera/.openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ollama

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    env_file:
      - /home/mlovera/lab/external/ollama/.env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      TZ: ${OPENCLAW_TZ:-UTC}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/mlovera/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/mlovera/.openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
    depends_on:
      - openclaw-gateway

networks:
  lab-network:
    external: true

volumes:
  ollama_data:
:
