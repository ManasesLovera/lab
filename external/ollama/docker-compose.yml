services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434" # Exposed to local network (0.0.0.0)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lab-network

  # open-webui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   container_name: open-webui
  #   restart: unless-stopped
  #   ports:
  #     - "3100:8080" # UI accessible at http://<your-ip>:3100
  #   environment:
  #     - OLLAMA_BASE_URL=http://ollama:11434
  #     - WEBUI_AUTH=true # Recommended to keep true if exposing to internet
  #   volumes:
  #     - ./webui_data:/app/backend/data
  #   networks:
  #     - lab-network
  #   depends_on:
  #     - ollama

networks:
  lab-network:
    external: true

volumes:
  ollama_data:
