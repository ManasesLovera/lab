name: ollama

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_ORIGINS=*
    ports:
      - "11434:11434" # Exposed to local network (0.0.0.0)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lab-network

networks:
  lab-network:
    external: true

volumes:
  ollama_data:
:
