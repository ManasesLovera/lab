# OpenProject Docker Compose - Migrated to Core Database

volumes:
  opdata:

networks:
  lab-network:
    external: true

services:
  cache:
    image: memcached
    restart: unless-stopped
    networks:
      - lab-network

  web:
    image: openproject/openproject:15
    container_name: openproject
    restart: unless-stopped
    environment:
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS}"
      OPENPROJECT_HOST__NAME: "${OPENPROJECT_HOST__NAME}"
      OPENPROJECT_HSTS: "false"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      # Pointing to the core database service
      DATABASE_URL: "postgres://openproject:${POSTGRES_PASSWORD}@postgres:5432/openproject"
      RAILS_CACHE_STORE: "memcache"
      MEMCACHED_SERVERS: "cache:11211"
      RAILS_MIN_THREADS: 4
      RAILS_MAX_THREADS: 16
    ports:
      - "${PORT}:80"
    volumes:
      - "opdata:/var/openproject/assets"
    depends_on:
      - cache
    networks:
      - lab-network

  worker:
    image: openproject/openproject:15
    restart: unless-stopped
    environment:
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      # Pointing to the core database service
      DATABASE_URL: "postgres://openproject:${POSTGRES_PASSWORD}@postgres:5432/openproject"
      RAILS_CACHE_STORE: "memcache"
      MEMCACHED_SERVERS: "cache:11211"
    volumes:
      - "opdata:/var/openproject/assets"
    depends_on:
      - cache
    command: "./docker/prod/worker"
    networks:
      - lab-network

  cron:
    image: openproject/openproject:15
    restart: unless-stopped
    environment:
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      # Pointing to the core database service
      DATABASE_URL: "postgres://openproject:${POSTGRES_PASSWORD}@postgres:5432/openproject"
      RAILS_CACHE_STORE: "memcache"
      MEMCACHED_SERVERS: "cache:11211"
    volumes:
      - "opdata:/var/openproject/assets"
    depends_on:
      - cache
    command: "./docker/prod/cron"
    networks:
      - lab-network
