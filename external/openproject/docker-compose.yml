# OpenProject Docker Compose - Official Multi-Container Setup
# Adapted for Lab Network

volumes:
  pgdata:
  opdata:

networks:
  lab-network:
    external: true

services:
  db:
    image: postgres:13-alpine
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: openproject
    networks:
      - lab-network

  cache:
    image: memcached
    restart: unless-stopped
    networks:
      - lab-network

  web:
    image: openproject/openproject:15
    container_name: openproject
    restart: unless-stopped
    environment:
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS}"
      OPENPROJECT_HOST__NAME: "${OPENPROJECT_HOST__NAME}"
      OPENPROJECT_HSTS: "false"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/openproject?pool=20&encoding=unicode"
      RAILS_CACHE_STORE: "memcache"
      MEMCACHED_SERVERS: "cache:11211"
      RAILS_MIN_THREADS: 4
      RAILS_MAX_THREADS: 16
    ports:
      - "${PORT}:80"
    volumes:
      - "opdata:/var/openproject/assets"
    depends_on:
      - db
      - cache
    networks:
      - lab-network

  worker:
    image: openproject/openproject:15
    restart: unless-stopped
    environment:
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/openproject?pool=20&encoding=unicode"
      RAILS_CACHE_STORE: "memcache"
      MEMCACHED_SERVERS: "cache:11211"
    volumes:
      - "opdata:/var/openproject/assets"
    depends_on:
      - db
      - cache
    command: "./docker/prod/worker"
    networks:
      - lab-network

  cron:
    image: openproject/openproject:15
    restart: unless-stopped
    environment:
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/openproject?pool=20&encoding=unicode"
      RAILS_CACHE_STORE: "memcache"
      MEMCACHED_SERVERS: "cache:11211"
    volumes:
      - "opdata:/var/openproject/assets"
    depends_on:
      - db
      - cache
    command: "./docker/prod/cron"
    networks:
      - lab-network
