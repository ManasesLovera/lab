version: '3.8'

services:
  openproject:
    image: openproject/openproject:latest
    container_name: openproject
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - OPENPROJECT_HTTPS=false
      - OPENPROJECT_HOST__NAME=openproject.local
    networks:
      - lab-network

networks:
  lab-network:
    external: true
